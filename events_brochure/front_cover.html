<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Theatre Breaks Brochure Front Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700;900&display=swap" rel="stylesheet">
  <style>
    /* A4 Page Setup */
    @page { size: A4; margin: 0; }
    html, body { height: 100%; }

    /* Core Body Styles */
    body {
      margin: 0;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      background: #f2f4f8;
      font-family: "Raleway", "Segoe UI", Roboto, Arial, Helvetica, sans-serif;
      font-weight: 700;
      color: #ffffff;
    }

    /* Page Container */
    .page {
      width: 210mm;
      height: 297mm;
      margin: 0 auto;
      position: relative;
      background: #000;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    }

    /* Brand Colors */
    :root{
      --llt-blue: #0a4ea3;
      --llt-blue-dark: #083f86;
    }

    /* Logo */
    .logo {
      position: absolute; top: 10mm; left: 12mm;
      height: 50mm; width: auto;
      z-index: 6;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.35));
    }

    /* Background Image */
    .bg {
      position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0;
      transform: scale(1.02);
    }

    /* Title & Subtitle */
    .title {
      position: absolute; left: 12mm; right: 12mm; bottom: 58mm; z-index: 5;
      max-width: 160mm;
      text-shadow: 0 2px 12px rgba(0,0,0,0.55);
    }
    h1 { margin: 0; font-size: 72px; line-height: 1.02; letter-spacing: 0.3px; font-weight: 900; }
    .subtitle { margin-top: 10px; font-size: 20px; opacity: 0.98; font-weight: 700; }

    /* Top-Right Badge (for pricing) */
    .badge {
      position: absolute; top: 28mm; right: 16mm; z-index: 6;
      background: #fff;
      color: var(--llt-blue);
      border: 2px solid var(--llt-blue);
      box-shadow: 0 8px 20px rgba(0,0,0,0.35);
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 900; font-size: 14px;
      white-space: nowrap;
    }
    .badge strong { font-size: 18px; }

    /* (Bubble styles from template - not used in this layout but kept for consistency) */
    .bubbles { position: absolute; top: 65mm; right: 12mm; width: 120mm; height: 120mm; z-index: 6; }
    .bubble { position: absolute; border-radius: 50%; overflow: hidden; border: 3px solid #fff; box-shadow: 0 10px 24px rgba(0,0,0,0.35); }
    .bubble img { width: 100%; height: 100%; object-fit: cover; }
    .bubble::after { content: ""; position: absolute; inset: 0; border-radius: 50%; box-shadow: inset 0 0 0 3px var(--llt-blue); opacity: 0.9; }
    .lg { width: 46mm; height: 46mm; right: 0; top: 0; }
    .md { width: 38mm; height: 38mm; right: 48mm; top: 16mm; }
    .sm { width: 32mm; height: 32mm; right: 14mm; top: 62mm; }

    /* Footer */
    .footer {
      position: absolute; left: 12mm; right: 12mm; bottom: 10mm; z-index: 7;
      display: flex; align-items: center; justify-content: space-between; gap: 8mm;
      color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.6);
      letter-spacing: 0.2px; font-size: 16px;
    }

    /* Print Styles */
    @media print { .page { box-shadow: none; } }
  </style>
</head>
<body>
  <!-- 
    A4 Page Container.
    The content inside is layered using position: absolute and z-index.
    Layer 0: Background Image
    Layer 5: Title
    Layer 6: Logo & Badge
    Layer 7: Footer
  -->
  <div class="page" role="document" aria-label="Theatre Breaks brochure front cover">
    
    <!-- Layer 0: Background Image -->
    <img class="bg" src="https://lochlomondtravel.com/images/download_5.jpg" alt="Vibrant stage performance of a musical" />

    <!-- Layer 6: Logo -->
    <img class="logo" src="https://lochlomondtravel.com/images/loch_lomond_logo__2_.png" alt="Loch Lomond Travel logo" />

    <!-- Layer 6: Pricing Badge -->
    <div class="badge">Deposits start from <strong>£35pp</strong></div>

    <!-- Layer 5: Title & Subtitle -->
    <header class="title">
      <h1>Theatre & Concert Breaks</h1>
      <div class="subtitle">Day trips & overnights, from Annie to Strictly!</div>
    </header>

    <!-- Layer 7: Footer -->
    <footer class="footer" aria-label="Contact details">
      <div>www.lochlomondtravel.com</div>
      <div>0141 487 6737</div>
    </footer>

  </div>
</body>
</html>
