<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Sports & Events Brochure Front Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700;900&display=swap" rel="stylesheet">
  <style>
    /* A4 Page Setup */
    @page { size: A4; margin: 0; }
    html, body { height: 100%; }

    /* Core Body Styles */
    body {
      margin: 0;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      background: #f2f4f8;
      font-family: "Raleway", "Segoe UI", Roboto, Arial, Helvetica, sans-serif;
      font-weight: 700;
      color: #ffffff;
    }

    /* Page Container */
    .page {
      width: 210mm;
      height: 297mm;
      margin: 0 auto;
      position: relative;
      background: #000;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    }

    /* Brand Colors */
    :root{
      --llt-blue: #0a4ea3;
      --llt-blue-dark: #083f86;
    }

    /* Logo */
    .logo {
      position: absolute; top: 10mm; left: 12mm;
      height: 50mm; width: auto;
      z-index: 6;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.35));
    }

    /* Background Image - Zoom fixed */
    .bg {
      position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0;
    }

    /* Title & Subtitle */
    .title {
      position: absolute; left: 12mm; right: 12mm; bottom: 58mm; z-index: 5;
      max-width: 160mm;
      text-shadow: 0 2px 12px rgba(0,0,0,0.55);
    }
    h1 { margin: 0; font-size: 72px; line-height: 1.02; letter-spacing: 0.3px; font-weight: 900; }
    .subtitle { margin-top: 10px; font-size: 20px; opacity: 0.98; font-weight: 700; }

    /* Top-Right Badge (for pricing) */
    .badge {
      position: absolute; top: 28mm; right: 16mm; z-index: 6;
      background: #fff;
      color: var(--llt-blue);
      border: 2px solid var(--llt-blue);
      box-shadow: 0 8px 20px rgba(0,0,0,0.35);
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 900; font-size: 14px;
      white-space: nowrap;
    }
    .badge strong { font-size: 18px; }

    /* Footer */
    .footer {
      position: absolute; left: 12mm; right: 12mm; bottom: 10mm; z-index: 7;
      display: flex; align-items: center; justify-content: space-between; gap: 8mm;
      color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.6);
      letter-spacing: 0.2px; font-size: 16px;
    }

    /* Print Styles */
    @media print { .page { box-shadow: none; } }
  </style>
</head>
<body>
  <div class="page" role="document" aria-label="Sports & Events brochure front cover">
    
    <img class="bg" src="https://lochlomondtravel.com/images/sports_breaks_2.jpg" alt="Exciting sports or event scene" style="background: #333;" />

    <img class="logo" src="https://lochlomondtravel.com/images/loch_lomond_logo__2_.png" alt="Loch Lomond Travel logo" />

    <div class="badge">Deposits start from <strong>£35pp</strong></div>

    <header class="title">
      <h1>Sports & </br>Special Events</h1>
      <div class="subtitle">From Air Shows to St Patrick's Day</div>
    </header>

    <footer class="footer" aria-label="Contact details">
      <div>www.lochlomondtravel.com</div>
      <div>0141 487 6737</div>
    </footer>

  </div>
</body>
</html>
